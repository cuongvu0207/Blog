<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Viết đánh giá — CTECH</title>
  <link rel="icon" href="assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon.svg?v=2">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-bootstrap.js"></script>
</head>
<body data-page="write">
  <div class="bg-effects" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

    <header class="site-header" id="site-header">
    <nav class="nav nav-unified nav-minimal" id="nav">
      <div class="nav-shell" id="toolbar">
        <a href="index.html" class="logo">
          <span class="logo-mark" aria-hidden="true">C</span>
          <span class="logo-text" data-field="site.title">CTECH</span>
        </a>
      <div class="nav-actions">
        <div class="nav-control" data-i18n-title="toolbar.theme">
          <span class="nav-control-icon" aria-hidden="true">🎨</span>
          <select id="theme-select" class="theme-select nav-select" aria-label="Giao diện"></select>
        </div>
        <div class="nav-control" data-i18n-title="toolbar.lang">
          <span class="nav-control-icon" aria-hidden="true">🌐</span>
          <select id="lang-select" class="lang-select nav-select" aria-label="Ngôn ngữ"></select>
        </div>
        <div id="user-toolbar" class="user-toolbar"></div>
      </div>
      </div>
    </nav>
  </header>

  <main class="write-page">
    <div class="write-card">
      <h1 data-i18n="user.writeTitle">Viết bài đánh giá</h1>
      <p class="write-desc" data-i18n="user.writeDesc">Chia sẻ trải nghiệm thật về thiết bị hoặc công nghệ bạn đã dùng</p>

      <form id="write-form" class="write-form">
        <label>
          <span data-i18n="admin.field.reviewTarget">Sản phẩm / công nghệ đánh giá</span>
          <input type="text" id="write-target" placeholder="VD: iPhone 16 Pro, MacBook Air M3...">
        </label>
        <label>
          <span data-i18n="admin.field.title">Tiêu đề</span>
          <input type="text" id="write-title" required>
        </label>
        <label>
          <span data-i18n="admin.field.excerpt">Mô tả ngắn</span>
          <textarea id="write-excerpt" rows="2"></textarea>
        </label>
        <label>
          <span data-i18n="admin.field.content">Nội dung đánh giá</span>
          <textarea id="write-content" rows="10" required></textarea>
        </label>
        <div class="form-row">
          <label>
            <span data-i18n="admin.field.rating">Điểm đánh giá (0–10)</span>
            <input type="number" id="write-rating" min="0" max="10" step="0.1" placeholder="8.5">
          </label>
          <label>
            <span data-i18n="admin.field.tags">Tags</span>
            <input type="text" id="write-tags" placeholder="smartphone, apple">
          </label>
        </div>
        <label>
          <span data-i18n="admin.field.image">Ảnh (URL hoặc upload)</span>
          <div class="image-input-row">
            <input type="text" id="write-image">
            <button type="button" class="btn-secondary" id="btn-write-upload" data-i18n="admin.upload">Upload</button>
            <input type="file" id="write-image-file" accept="image/*" class="hidden">
          </div>
          <img src="" alt="" id="write-image-preview" class="image-preview hidden">
        </label>
        <div class="write-actions">
          <a href="posts.html" class="btn-secondary" data-i18n="admin.cancel">Hủy</a>
          <button type="submit" class="btn-primary" data-i18n="user.publish">Đăng bài</button>
        </div>
      </form>
    </div>
  </main>

  <div class="toast hidden" id="toast"></div>
  <script src="js/ui-select.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/core.js"></script>
  <script src="js/user-auth.js"></script>
  <script src="js/write-page.js"></script>
</body>
</html>
