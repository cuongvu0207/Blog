<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu — CTECH Admin</title>
  <link rel="icon" href="../assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/favicon.svg?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="../js/theme-bootstrap.js"></script>
</head>
<body class="admin-body admin-login-page" data-base="../" data-page="admin-forgot">
  <main class="admin-login">
    <div class="admin-login-card">
      <div class="admin-login-lang">
        <select id="lang-select" class="lang-select"></select>
      </div>
      <h1 data-i18n="admin.forgot.title">Quên mật khẩu</h1>
      <p data-i18n="admin.forgot.desc">Nhập Gmail chủ blog để nhận mã xác nhận đặt lại mật khẩu</p>

      <form id="forgot-step1" autocomplete="off">
        <label>
          <span class="i18n-label" data-i18n="admin.forgot.email">Gmail chủ blog</span>
          <input type="email" id="forgot-email" autocomplete="email" required>
        </label>
        <p class="login-error hidden" id="forgot-error"></p>
        <p class="admin-login-hint hidden" id="forgot-success"></p>
        <button type="submit" class="btn-primary" data-i18n="admin.forgot.sendCode">Gửi mã xác nhận</button>
      </form>

      <form id="forgot-step2" class="hidden" autocomplete="off">
        <label>
          <span class="i18n-label" data-i18n="admin.forgot.code">Mã xác nhận (6 số)</span>
          <input type="text" id="reset-code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
        </label>
        <label>
          <span class="i18n-label" data-i18n="admin.forgot.newPassword">Mật khẩu mới</span>
          <input type="password" id="reset-new-password" autocomplete="new-password" required>
        </label>
        <label>
          <span class="i18n-label" data-i18n="admin.forgot.confirmPassword">Xác nhận mật khẩu mới</span>
          <input type="password" id="reset-confirm-password" autocomplete="new-password" required>
        </label>
        <p class="login-error hidden" id="reset-error"></p>
        <button type="submit" class="btn-primary" data-i18n="admin.forgot.reset">Đặt lại mật khẩu</button>
      </form>

      <a href="login.html" class="admin-login-back" data-i18n="admin.forgot.backLogin">← Quay lại đăng nhập</a>
    </div>
  </main>

  <script src="../js/ui-select.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (async () => {
      await I18n.init();
      let ownerEmail = '';

      const step1 = document.getElementById('forgot-step1');
      const step2 = document.getElementById('forgot-step2');
      const err1 = document.getElementById('forgot-error');
      const ok1 = document.getElementById('forgot-success');
      const err2 = document.getElementById('reset-error');

      step1.addEventListener('submit', async (e) => {
        e.preventDefault();
        err1.classList.add('hidden');
        ok1.classList.add('hidden');
        ownerEmail = document.getElementById('forgot-email').value.trim();
        const result = await AdminAuth.forgotPassword(ownerEmail);
        if (result.ok) {
          ok1.textContent = result.message || I18n.t('admin.forgot.sent');
          ok1.classList.remove('hidden');
          step1.classList.add('hidden');
          step2.classList.remove('hidden');
        } else {
          err1.textContent = result.error || I18n.t('admin.forgot.error');
          err1.classList.remove('hidden');
        }
      });

      step2.addEventListener('submit', async (e) => {
        e.preventDefault();
        err2.classList.add('hidden');
        const code = document.getElementById('reset-code').value.trim();
        const newPassword = document.getElementById('reset-new-password').value;
        const confirmPassword = document.getElementById('reset-confirm-password').value;
        if (newPassword !== confirmPassword) {
          err2.textContent = I18n.t('admin.security.confirmMismatch');
          err2.classList.remove('hidden');
          return;
        }
        const result = await AdminAuth.resetPassword(ownerEmail, code, newPassword);
        if (result.ok) {
          await AdminAuth.login(newPassword);
          window.location.href = 'index.html';
        } else {
          err2.textContent = result.error || I18n.t('admin.forgot.resetError');
          err2.classList.remove('hidden');
        }
      });
    })();
  </script>
</body>
</html>
