<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CTECH</title>
  <link rel="icon" href="../assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/favicon.svg?v=2">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="../js/theme-bootstrap.js"></script>
</head>
<body class="admin-body" data-base="../">
  <header class="admin-header">
    <h1 data-i18n="admin.title">Bảng quản trị CTECH</h1>
    <div class="admin-header-actions">
      <button type="button" id="btn-admin-logout" class="admin-logout-btn" data-i18n="admin.logout">Đăng xuất</button>
      <select id="lang-select" class="lang-select"></select>
      <nav class="admin-nav">
        <a href="index.html" class="active" data-i18n="admin.dashboard">Tổng quan</a>
        <a href="posts.html" data-i18n="admin.posts">Quản lý đánh giá</a>
        <a href="site.html" data-i18n="admin.site">Cài đặt Website</a>
        <a href="security.html" data-i18n="admin.security.nav">Bảo mật</a>
        <a href="../index.html" data-i18n="admin.backToSite">← Về website</a>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-stats">
      <div class="admin-stat">
        <div class="admin-stat-num" id="stat-posts">0</div>
        <div class="admin-stat-label" data-i18n="admin.stats.posts">Bài đánh giá</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat-num" id="stat-comments">0</div>
        <div class="admin-stat-label" data-i18n="admin.stats.comments">Bình luận</div>
      </div>
    </div>

    <div class="admin-cards">
      <a href="posts.html" class="admin-card">
        <div class="admin-card-icon">📝</div>
        <h3 data-i18n="admin.posts">Quản lý đánh giá</h3>
        <p data-i18n="admin.postsDesc">Thêm, sửa, xóa bài đánh giá công nghệ</p>
      </a>
      <a href="site.html" class="admin-card">
        <div class="admin-card-icon">⚙️</div>
        <h3 data-i18n="admin.site">Cài đặt Website</h3>
        <p data-i18n="admin.siteDesc">Thông tin website, profile, giới thiệu</p>
      </a>
      <a href="security.html" class="admin-card">
        <div class="admin-card-icon">🔐</div>
        <h3 data-i18n="admin.security.nav">Bảo mật</h3>
        <p data-i18n="admin.security.desc">Đổi mật khẩu quản trị, khôi phục qua Gmail</p>
      </a>
    </div>
  </main>

  <div class="toast hidden" id="toast"></div>
  <script src="../js/i18n.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/core.js"></script>
  <script>
    // Full app served from Render backend (same origin) - relative paths only, no API_BASE
  </script>
  <script>
    (async () => {
      await AdminAuth.requireAuth();
      await BlogCore.initAdmin();
      AdminAuth.bindLogout();
      const posts = BlogCore.data().posts || [];
      BlogCore.$('#stat-posts').textContent = posts.length;
      BlogCore.$('#stat-comments').textContent = posts.reduce((n, p) => n + (p.comments?.length || 0), 0);
    })();
  </script>
</body>
</html>
