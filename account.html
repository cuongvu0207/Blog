<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tài khoản — CTECH</title>
  <link rel="icon" href="assets/favicon.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/favicon.svg?v=2">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme-bootstrap.js"></script>
</head>
<body data-page="account">
  <div class="bg-effects" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="toolbar" id="toolbar">
    <div class="toolbar-right">
      <label class="theme-label" data-i18n="toolbar.theme">Giao diện</label>
      <select id="theme-select" class="theme-select"></select>
      <label class="theme-label" data-i18n="toolbar.lang">Ngôn ngữ</label>
      <select id="lang-select" class="lang-select"></select>
      <div id="user-toolbar" class="user-toolbar"></div>
    </div>
  </div>

  <main class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">
        <span class="logo-mark">C</span>
        <span class="logo-text" data-field="site.title">CTECH</span>
      </a>
      <h1 data-i18n="user.accountTitle">Tham gia cộng đồng</h1>
      <p class="auth-desc" data-i18n="user.accountDesc">Sign up to write tech reviews and join the conversation</p>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login" data-i18n="user.login">Sign in</button>
        <button type="button" class="auth-tab" data-tab="register" data-i18n="user.register">Sign up</button>
      </div>

      <div class="auth-social hidden" id="google-auth-block">
        <div id="google-btn-host" class="google-btn-host"></div>
        <p class="auth-divider"><span data-i18n="user.or">hoặc</span></p>
      </div>

      <form id="login-form" class="auth-form">
        <label>
          <span data-i18n="user.username">Tên đăng nhập</span>
          <input type="text" id="login-username" autocomplete="username" required>
        </label>
        <label>
          <span data-i18n="user.password">Mật khẩu</span>
          <input type="password" id="login-password" autocomplete="current-password" required>
        </label>
        <p class="auth-error hidden" id="login-error"></p>
        <button type="submit" class="btn-primary" data-i18n="user.login">Sign in</button>
      </form>

      <form id="register-form" class="auth-form hidden">
        <label>
          <span data-i18n="user.username">Tên đăng nhập</span>
          <input type="text" id="register-username" autocomplete="username" required pattern="[A-Za-z0-9_]{3,32}">
        </label>
        <label>
          <span data-i18n="user.displayName">Tên hiển thị</span>
          <input type="text" id="register-display" maxlength="80">
        </label>
        <label>
          <span data-i18n="user.email">Email (tuỳ chọn)</span>
          <input type="email" id="register-email" autocomplete="email">
        </label>
        <label>
          <span data-i18n="user.password">Mật khẩu</span>
          <input type="password" id="register-password" autocomplete="new-password" required minlength="6">
        </label>
        <p class="auth-hint" data-i18n="user.passwordHint">Tối thiểu 6 ký tự. Tên đăng nhập: chữ, số, gạch dưới.</p>
        <p class="auth-error hidden" id="register-error"></p>
        <button type="submit" class="btn-primary" data-i18n="user.register">Sign up</button>
      </form>

      <a href="index.html" class="auth-back" data-i18n="user.backHome">← Về trang chủ</a>
    </div>
  </main>

  <div class="toast hidden" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/core.js"></script>
  <script src="js/user-auth.js"></script>
  <script src="js/account-page.js"></script>
</body>
</html>
